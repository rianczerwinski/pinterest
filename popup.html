<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinterest Pin Downloader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Pinterest Pin Manager</h1>
    </header>

    <!-- Tab connection + profile input -->
    <div class="toolbar">
      <div class="toolbar-row">
        <div class="tab-status" id="pinterestTabStatus">
          <span class="status-dot" id="tabStatusDot"></span>
          <span id="tabStatusText">Checking...</span>
          <button id="refreshTabsBtn" class="btn-icon" title="Refresh tabs">&#x21bb;</button>
        </div>
        <button id="openPinterestBtn" class="btn btn-sm btn-secondary" style="display:none">Open Pinterest</button>
      </div>

      <div class="toolbar-row">
        <input type="text" id="usernameInput" placeholder="Pinterest username">
        <button id="loadProfileBtn" class="btn btn-primary">Load Profile</button>
        <button id="diagnoseBtn" class="btn btn-sm btn-secondary" title="Debug: inspect page structure">Diagnose</button>
        <div class="toolbar-spacer"></div>
        <button id="exportBtn" class="btn btn-sm btn-secondary">Export</button>
        <button id="importBtn" class="btn btn-sm btn-secondary">Import</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div>

      <div id="statusBar" class="status-message"></div>
    </div>

    <!-- Board selection -->
    <div id="boardSection" class="board-section" style="display:none">
      <div class="section-header">
        <span class="section-title">Boards (<span id="boardCount">0</span>)</span>
        <div class="section-actions">
          <button id="selectAllBoardsBtn" class="btn btn-sm btn-secondary">Select All</button>
          <button id="selectIncompleteBoardsBtn" class="btn btn-sm btn-secondary" title="Select boards below 99% completion">Incomplete</button>
          <button id="deselectAllBoardsBtn" class="btn btn-sm btn-secondary">Deselect All</button>
          <button id="scrapeCountsBtn" class="btn btn-sm btn-secondary" title="Visit each board to get exact pin counts">Scrape Counts</button>
          <label class="manual-scrape-toggle"><input type="checkbox" id="manualScrapeToggle"> Manual scroll</label>
          <button id="loadSelectedBoardsBtn" class="btn btn-sm btn-primary">Load Selected</button>
        </div>
      </div>
      <div id="profileSummary" class="profile-summary" style="display:none"></div>
      <div id="boardGrid" class="board-grid"></div>
    </div>

    <!-- Diff summary (shown after re-fetch) -->
    <div id="diffSection" class="diff-section" style="display:none">
      <div class="diff-summary" id="diffSummary"></div>
      <button id="selectNewPinsBtn" class="btn btn-sm btn-primary">Select New Pins Only</button>
      <button id="dismissDiffBtn" class="btn btn-sm btn-secondary">Dismiss</button>
    </div>

    <!-- Pin controls -->
    <div id="pinControls" class="pin-controls" style="display:none">
      <div class="pin-controls-row">
        <input type="text" id="searchInput" placeholder="Search pins...">
        <select id="filterSelect">
          <option value="all">All pins</option>
          <option value="new">New only</option>
          <option value="downloaded">Downloaded</option>
          <option value="not-downloaded">Not downloaded</option>
          <option value="failed">Failed (retryable)</option>
          <option value="selected">Selected</option>
        </select>
        <div class="toolbar-spacer"></div>
        <button id="selectAllPinsBtn" class="btn btn-sm btn-secondary">Select All</button>
        <button id="deselectAllPinsBtn" class="btn btn-sm btn-secondary">Deselect All</button>
        <button id="resetDownloadsBtn" class="btn btn-sm btn-secondary">Reset Downloads</button>
        <button id="exportMetadataBtn" class="btn btn-sm btn-secondary" title="Export metadata JSON for already-downloaded pins">Export Metadata</button>
        <button id="downloadSelectedBtn" class="btn btn-sm btn-success">Download Selected</button>
      </div>
      <div class="pin-controls-row">
        <span class="download-stats">
          Total: <strong id="totalPins">0</strong> &middot;
          Selected: <strong id="selectedPins">0</strong> &middot;
          Downloaded: <strong id="downloadedPins">0</strong> &middot;
          New: <strong id="newPins">0</strong>
        </span>
        <div class="toolbar-spacer"></div>
        <details class="settings-toggle">
          <summary>Settings</summary>
          <div class="settings-grid">
            <label>Min delay (ms) <input type="number" id="minDelay" value="100" min="0" step="50"></label>
            <label>Max delay (ms) <input type="number" id="maxDelay" value="300" min="0" step="50"></label>
            <label>Batch size <input type="number" id="batchSize" value="20" min="1" max="100"></label>
            <label>Batch delay (ms) <input type="number" id="batchDelay" value="1000" min="0" step="100"></label>
            <label>Concurrent <input type="number" id="concurrency" value="6" min="1" max="10"></label>
            <label>Max retries <input type="number" id="maxRetries" value="3" min="0" max="10"></label>
            <label><input type="checkbox" id="exponentialBackoff" checked> Exp. backoff</label>
            <label class="settings-wide">Download folder <input type="text" id="folderPrefix" value="pinterest" placeholder="pinterest"></label>
            <span class="settings-hint">Subfolder under Chrome Downloads</span>
          </div>
        </details>
      </div>
      <!-- Harvest verification (persistent, per-board accounting) -->
      <div id="harvestVerification" class="harvest-verification" style="display:none"></div>
      <!-- Resume banner -->
      <div id="resumeBanner" class="resume-banner" style="display:none">
        <span id="resumeText">Interrupted download: 0/0 remaining</span>
        <button id="resumeBtn" class="btn btn-sm btn-primary">Resume</button>
        <button id="clearResumeBtn" class="btn btn-sm btn-secondary">Clear</button>
      </div>
      <!-- Download progress -->
      <div id="downloadProgress" class="download-progress" style="display:none">
        <div class="progress-info">
          <span id="progressText">Downloading...</span>
          <span id="progressCount">0/0</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>
    </div>

    <!-- Pin list -->
    <div class="pins-container">
      <div id="pinsList"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
