<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinterest Pin Downloader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Pinterest Pin Manager</h1>
    </header>

    <div class="controls">
      <div class="fetch-grid">
        <div class="fetch-col-1">
          <input type="text" id="usernameInput" placeholder="Username">
          <button id="fetchAllBtn" class="btn btn-primary">Fetch All</button>
          <label class="radio-label">
            <input type="radio" name="grouping" value="all" checked>
            All Pins
          </label>
        </div>
        <div class="fetch-col-2">
          <input type="text" id="searchInput" placeholder="Search pins...">
          <button id="fetchByBoardBtn" class="btn btn-primary">By Boards</button>
          <label class="radio-label">
            <input type="radio" name="grouping" value="boards">
            By Boards
          </label>
        </div>
        <div class="fetch-col-3">
          <div class="pinterest-tab-section">
            <div class="tab-status" id="pinterestTabStatus">
              <span class="status-indicator" id="tabStatusIndicator">●</span>
              <span id="tabStatusText">Checking...</span>
              <button id="refreshTabsBtn" class="btn-icon" title="Refresh">🔄</button>
            </div>
            <div id="tabSelector" class="tab-selector" style="display: none;">
              <!-- Dynamically populated with Pinterest tabs -->
            </div>
            <button id="openPinterestBtn" class="btn btn-link" style="display: none;">
              Open Pinterest
            </button>
          </div>
        </div>
      </div>
      <div id="fetchStatus" class="status-message"></div>

      <div class="save-section">
        <span class="section-label">Storage:</span>
        <button id="manualSaveBtn" class="btn btn-secondary btn-sm">Save</button>
        <button id="exportBtn" class="btn btn-secondary btn-sm">Export</button>
        <button id="importBtn" class="btn btn-secondary btn-sm">Import</button>
        <span class="autosave-indicator" id="autosaveStatus">Autosave: On</span>
        <input type="file" id="importFile" accept=".json" style="display: none;">
      </div>

      <div class="settings-section">
        <details>
          <summary>Anti-Bot Settings</summary>
          <div class="settings-grid">
            <div class="setting-item">
              <label for="minDelay">Min Delay (ms)</label>
              <input type="number" id="minDelay" value="2000" min="500" max="30000" step="100">
            </div>
            <div class="setting-item">
              <label for="maxDelay">Max Delay (ms)</label>
              <input type="number" id="maxDelay" value="5000" min="1000" max="60000" step="100">
            </div>
            <div class="setting-item">
              <label for="batchSize">Batch Size</label>
              <input type="number" id="batchSize" value="5" min="1" max="50">
            </div>
            <div class="setting-item">
              <label for="batchDelay">Batch Delay (ms)</label>
              <input type="number" id="batchDelay" value="10000" min="5000" max="120000" step="1000">
            </div>
            <div class="setting-item">
              <label for="maxRetries">Max Retries</label>
              <input type="number" id="maxRetries" value="3" min="0" max="10">
            </div>
            <div class="setting-item">
              <label>
                <input type="checkbox" id="exponentialBackoff" checked>
                Exponential Backoff
              </label>
            </div>
          </div>
        </details>
      </div>

      <div class="download-section">
        <span class="section-label">Downloads:</span>
        <button id="downloadSelectedBtn" class="btn btn-success btn-sm">Download</button>
        <button id="selectAllBtn" class="btn btn-secondary btn-sm">Select All</button>
        <button id="deselectAllBtn" class="btn btn-secondary btn-sm">Deselect All</button>
        <span class="download-stats">
          <span>Total: <strong id="totalPins">0</strong></span>
          <span>Selected: <strong id="selectedPins">0</strong></span>
          <span>Downloaded: <strong id="downloadedPins">0</strong></span>
        </span>
        <div id="downloadProgress" class="download-progress" style="display: none;">
          <div class="progress-info">
            <span id="progressText">Downloading...</span>
            <span id="progressCount">0/0</span>
          </div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="pins-container">
      <div id="pinsList"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
